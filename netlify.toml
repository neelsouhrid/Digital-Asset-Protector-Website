# Netlify build configuration for TanStack Start ≥ 1.132.
#
# We use the @netlify/vite-plugin-tanstack-start preset path. If you haven't
# already, install the plugin:
#   npm install -D @netlify/vite-plugin-tanstack-start
# and add it to vite.config.ts. The plugin handles SSR + edge function
# routing automatically and emits the right .netlify/v1/functions output.

[build]
  command = "vite build"
  publish = "dist/client"

[dev]
  command = "vite dev"
  port = 3000

# Set NODE_VERSION to match the local dev environment so Netlify's build
# sandbox doesn't drift on minor versions.
[build.environment]
  NODE_VERSION = "20"

# The Netlify preset for TanStack Start expects this SPA-fallback for any
# route the SSR function doesn't catch. Asset requests are served directly
# from dist/client.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
