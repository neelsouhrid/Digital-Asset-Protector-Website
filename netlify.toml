# Netlify build configuration for TanStack Start (SSR).
#
# The @netlify/vite-plugin-tanstack-start plugin (in vite.config.ts)
# builds both the client bundle (dist/client/) and the SSR server
# (.netlify/v1/functions/server.mjs → dist/server/) in one pass.

[build]
  command = "vite build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

[dev]
  command = "vite dev"
  port = 3000

# The SSR function uses dynamic import() to load chunks from
# dist/server/assets/. Netlify's function bundler cannot trace dynamic
# imports, so we explicitly include the entire dist/server directory.
[functions]
  included_files = ["dist/server/**"]
  node_bundler = "none"

# Catch-all rewrite so every request that isn't a static asset in
# dist/client/ is handled by the SSR function.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
