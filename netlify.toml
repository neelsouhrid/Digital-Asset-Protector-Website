# Netlify build configuration for TanStack Start ≥ 1.132.
#
# The Lovable preset (@lovable.dev/vite-tanstack-config) auto-detects the
# Nitro preset from the NITRO_PRESET env var. Setting it to "netlify" here
# makes Nitro emit a Netlify-compatible function bundle at
# .netlify/v1/functions/server.

[build]
  command = "vite build"
  publish = "dist/client"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"

[dev]
  command = "vite dev"
  port = 3000

# SPA-fallback: any route that the SSR function doesn't match gets
# rewritten to the server function, which then streams the rendered HTML
# (or, for assets, falls through to dist/client).
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
