# Netlify build configuration for TanStack Start ≥ 1.132.
#
# The @netlify/vite-plugin-tanstack-start plugin (wired in vite.config.ts)
# orchestrates both the Vite client build (dist/client/) and the Nitro server
# build (.netlify/v1/functions/server) in a single `vite build` run. Netlify's
# build system auto-discovers the function directory and wires the redirect.

[build]
  command = "vite build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "vite dev"
  port = 3000

# No manual redirects needed — the @netlify/vite-plugin-tanstack-start
# plugin emits a v2 Netlify function at .netlify/v1/functions/server.mjs
# that declares path = "/*" in its config export, so Netlify automatically
# routes all requests through the SSR handler. Adding a [[redirects]] here
# would conflict and cause 500 errors by pointing at the wrong endpoint.
