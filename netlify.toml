# Netlify build configuration for TanStack Start ≥ 1.132.
#
# The @netlify/vite-plugin-tanstack-start plugin (wired in vite.config.ts)
# orchestrates both the Vite client build (dist/client/) and the Nitro server
# build (.netlify/v1/functions/server) in a single `vite build` run. Netlify's
# build system auto-discovers the function directory and wires the redirect.

[build]
  command = "vite build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "vite dev"
  port = 3000

# SPA-fallback: any route that the SSR function doesn't match gets
# rewritten to the server function, which then streams the rendered HTML
# (or, for assets, falls through to dist/client/).
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
